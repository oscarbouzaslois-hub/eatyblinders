<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#E8532C"/>
  <!-- Theater masks symbol (stylized 🎭) -->
  <g transform="translate(256, 256)">
    <!-- Left mask (happy) -->
    <circle cx="-90" cy="0" r="70" fill="none" stroke="#fff" stroke-width="8"/>
    <circle cx="-120" cy="-20" r="8" fill="#fff"/>
    <circle cx="-60" cy="-20" r="8" fill="#fff"/>
    <path d="M -120 20 Q -90 40 -60 20" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Right mask (contemplative) -->
    <circle cx="90" cy="0" r="70" fill="none" stroke="#fff" stroke-width="8"/>
    <circle cx="60" cy="-20" r="8" fill="#fff"/>
    <circle cx="120" cy="-20" r="8" fill="#fff"/>
    <path d="M 60 30 Q 90 10 120 30" stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
